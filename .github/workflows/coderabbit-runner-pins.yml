name: CodeRabbit Runner Pin Check

on:
  workflow_dispatch:
  schedule:
    - cron: "21 9 1 * *"
  pull_request:
    paths:
      - scripts/coderabbit.Dockerfile
      - .github/workflows/coderabbit-runner-pins.yml

permissions:
  contents: read

concurrency:
  group: coderabbit-runner-pin-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-pins:
    name: Build pinned CodeRabbit runner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - name: Build pinned CodeRabbit runner
        run: docker build -f scripts/coderabbit.Dockerfile -t screenarr-coderabbit-cli:pin-check scripts
